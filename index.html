<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Training: The Algorithm</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        h1 {
            text-shadow: 0 0 10px #0f0;
            margin: 0 0 26px 0;
            font-size: 2.3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
        }

        #game-container {
            position: relative;
        }

        canvas {
            display: block;
            background-color: #000;
            border: 2px solid #00eaff;
            box-shadow: 0 0 22px rgba(0, 255, 255, 0.35);
        }

        #top-bar {
            position: absolute;
            top: -40px;
            left: 0;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            align-items: center;
            font-size: 1rem;
            color: #0ff;
            text-shadow: 0 0 5px #0ff;
            gap: 8px;
        }

        #top-left {
            text-align: left;
        }

        #top-center {
            text-align: center;
        }

        #top-right {
            text-align: right;
        }

        .boost-slots {
            display: inline-flex;
            gap: 4px;
            vertical-align: middle;
            margin-left: 6px;
        }

        .boost-slot {
            width: 10px;
            height: 10px;
            display: inline-block;
            border: 1px solid #00eaff;
            background: rgba(0, 0, 0, 0.25);
            box-shadow: 0 0 6px rgba(0, 234, 255, 0.2);
        }

        .boost-slot.filled {
            background: #52f7ff;
            box-shadow: 0 0 8px rgba(82, 247, 255, 0.85);
        }

        #ui-layer {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.78);
            text-align: center;
            z-index: 10;
        }

        .start-text {
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
            font-size: 1.9rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .neon-text {
            color: #f00;
            text-shadow: 0 0 15px #f00, 0 0 30px #f00;
            font-size: 2.4rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .sub-text {
            color: #d8ffff;
            font-size: 0.98rem;
            line-height: 1.4;
            margin-bottom: 18px;
            max-width: 360px;
        }

        .score-text {
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .leaderboard {
            width: 270px;
            margin-bottom: 22px;
            border: 1px solid #00f6ff;
            padding: 14px 18px;
            background: rgba(0, 30, 35, 0.56);
            box-shadow: 0 0 14px rgba(0, 255, 255, 0.22);
        }

        .leaderboard h2 {
            margin: 0 0 10px 0;
            font-size: 1.15rem;
            color: #0ff;
            text-transform: uppercase;
            text-shadow: 0 0 8px #0ff;
        }

        .leaderboard ol {
            margin: 0;
            padding-left: 22px;
            text-align: left;
            color: #fff;
        }

        .leaderboard li {
            margin: 8px 0;
            font-size: 1rem;
        }

        button {
            background-color: #000;
            color: #0ff;
            border: 2px solid #0ff;
            padding: 13px 24px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.45);
            transition: all 0.2s ease-in-out;
            text-transform: uppercase;
        }

        button:hover {
            background-color: #0ff;
            color: #000;
            box-shadow: 0 0 22px #0ff;
        }

        .hint-text {
            margin-top: 14px;
            font-size: 0.88rem;
            color: #bdfcff;
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <h1>AI Training Sequence</h1>

    <div id="game-container">
        <div id="top-bar">
            <div id="top-left">
                Data: <span id="current-score" style="color: #0f0; text-shadow: 0 0 5px #0f0;">0</span>
            </div>
            <div id="top-center">
                Status: <span id="status-text" style="color: #0ff; text-shadow: 0 0 5px #0ff;">STANDBY</span>
            </div>
            <div id="top-right">
                Boost:
                <span class="boost-slots" id="boost-slots">
                    <span class="boost-slot"></span>
                    <span class="boost-slot"></span>
                    <span class="boost-slot"></span>
                </span>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="ui-layer">
            <div id="overlay-title" class="start-text">AI Training Sequence</div>
            <div id="overlay-subtitle" class="sub-text">Samla träningsdata. Undvik väggar, buggar och din egen kod.
            </div>

            <div class="leaderboard">
                <h2>Leaderboard</h2>
                <ol id="leaderboard-list"></ol>
            </div>

            <div id="gameover-score" class="score-text" style="display: none;">
                Insamlad Träningsdata: <span id="final-score">0</span>
            </div>

            <button id="start-btn">STARTA ALGORITMEN</button>
            <div class="hint-text">Styr med pilar/WASD • Pausa med Space eller P • Aktivera boost med K</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const currentScoreEl = document.getElementById('current-score');
        const finalScoreEl = document.getElementById('final-score');
        const uiLayer = document.getElementById('ui-layer');
        const startBtn = document.getElementById('start-btn');
        const overlayTitle = document.getElementById('overlay-title');
        const overlaySubtitle = document.getElementById('overlay-subtitle');
        const gameoverScore = document.getElementById('gameover-score');
        const leaderboardList = document.getElementById('leaderboard-list');
        const statusText = document.getElementById('status-text');
        const boostSlotsEl = document.getElementById('boost-slots');

        const TILE_SIZE = 24;
        const COLS = 20;
        const ROWS = 22;

        canvas.width = COLS * TILE_SIZE;
        canvas.height = ROWS * TILE_SIZE;

        const LEADERBOARD_KEY = 'snake_ai_top3_scores';

        let snake = [];
        let dx = 0;
        let dy = 0;
        let nextDx = 0;
        let nextDy = 0;

        let food = { x: 0, y: 0 };
        let bugs = [];
        let specialFood = null;

        let score = 0;
        let baseSpeed = 110;
        let currentSpeed = baseSpeed;

        let lastTime = 0;
        let accumulator = 0;
        let isGameOver = false;
        let hasStarted = false;
        let isPaused = false;
        let animationId = null;

        let growthQueue = 0;

        let boostInventory = 0;
        let boostActive = false;
        let activeBoostLevel = 0;
        let boostEndsAt = 0;
        let pauseStartedAt = 0;

        let greenFoodsSinceLastSpecial = 0;
        let nextSpecialThreshold = getRandomSpecialThreshold();

        function getRandomSpecialThreshold() {
            return Math.floor(Math.random() * 4) + 4; // 4 till 7 gröna block
        }

        function getLeaderboard() {
            const saved = localStorage.getItem(LEADERBOARD_KEY);
            if (!saved) return [0, 0, 0];

            try {
                const parsed = JSON.parse(saved);
                if (!Array.isArray(parsed)) return [0, 0, 0];

                const cleaned = parsed
                    .map(v => Number(v) || 0)
                    .sort((a, b) => b - a)
                    .slice(0, 3);

                while (cleaned.length < 3) cleaned.push(0);
                return cleaned;
            } catch {
                return [0, 0, 0];
            }
        }

        function renderLeaderboard() {
            const scores = getLeaderboard();
            leaderboardList.innerHTML = '';

            scores.forEach((value, index) => {
                const li = document.createElement('li');
                li.textContent = `#${index + 1} – ${value}`;
                leaderboardList.appendChild(li);
            });
        }

        function saveScoreToLeaderboard(newScore) {
            const scores = getLeaderboard();
            scores.push(newScore);

            const updated = scores
                .sort((a, b) => b - a)
                .slice(0, 3);

            localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(updated));
            renderLeaderboard();
        }

        function updateBoostUI() {
            const slots = boostSlotsEl.querySelectorAll('.boost-slot');
            slots.forEach((slot, index) => {
                slot.classList.toggle('filled', index < boostInventory);
            });
        }

        function getBoostDuration(level) {
            if (level === 1) return 5000;
            if (level === 2) return 10000;
            return 20000;
        }

        function getBoostSlowMultiplier(level) {
            if (level === 1) return 1.55;
            if (level === 2) return 1.8;
            return 2.1;
        }

        function getEffectiveSpeed() {
            if (!boostActive) return currentSpeed;
            return currentSpeed * getBoostSlowMultiplier(activeBoostLevel);
        }

        function activateBoost() {
            if (!hasStarted || isGameOver || isPaused) return;
            if (boostInventory <= 0) return;
            if (boostActive) return;

            activeBoostLevel = boostInventory;
            boostInventory = 0;
            updateBoostUI();

            boostActive = true;
            boostEndsAt = performance.now() + getBoostDuration(activeBoostLevel);
            updateStatusText();
        }

        function deactivateBoost() {
            boostActive = false;
            activeBoostLevel = 0;
            boostEndsAt = 0;
            updateStatusText();
        }

        function updateBoostTimer(now) {
            if (boostActive && now >= boostEndsAt) {
                deactivateBoost();
            }
        }

        function updateStatusText() {
            if (isGameOver) {
                statusText.innerText = 'CRASHED';
                return;
            }

            if (isPaused) {
                statusText.innerText = 'PAUSED';
                return;
            }

            if (boostActive) {
                const remainingMs = Math.max(0, boostEndsAt - performance.now());
                const remainingSec = Math.ceil(remainingMs / 1000);
                statusText.innerText = `BOOST x${activeBoostLevel} ${remainingSec}s`;
                return;
            }

            statusText.innerText = 'LEARNING...';
        }

        function togglePause() {
            if (!hasStarted || isGameOver) return;

            isPaused = !isPaused;

            if (isPaused) {
                pauseStartedAt = performance.now();
            } else {
                const pausedDuration = performance.now() - pauseStartedAt;
                lastTime = performance.now();

                if (boostActive) {
                    boostEndsAt += pausedDuration;
                }
            }

            updateStatusText();
        }

        window.addEventListener('keydown', (e) => {
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " ", "p", "P", "k", "K"].includes(e.key)) {
                e.preventDefault();
            }

            const key = e.key.toLowerCase();

            if ((e.key === ' ' || key === 'p') && hasStarted && !isGameOver) {
                togglePause();
                return;
            }

            if (key === 'k' && hasStarted && !isGameOver) {
                activateBoost();
                return;
            }

            if (e.key === ' ' && (!hasStarted || isGameOver)) {
                startGame();
                return;
            }

            if (!hasStarted || isGameOver || isPaused) return;

            if ((e.key === 'ArrowUp' || key === 'w') && dy === 0) {
                nextDx = 0;
                nextDy = -1;
            } else if ((e.key === 'ArrowDown' || key === 's') && dy === 0) {
                nextDx = 0;
                nextDy = 1;
            } else if ((e.key === 'ArrowLeft' || key === 'a') && dx === 0) {
                nextDx = -1;
                nextDy = 0;
            } else if ((e.key === 'ArrowRight' || key === 'd') && dx === 0) {
                nextDx = 1;
                nextDy = 0;
            }
        });

        startBtn.addEventListener('click', startGame);

        function startGame() {
            hasStarted = true;
            isGameOver = false;
            isPaused = false;

            const startX = Math.floor(COLS / 2);
            const startY = Math.floor(ROWS / 2);

            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];

            dx = 1;
            dy = 0;
            nextDx = 1;
            nextDy = 0;

            food = { x: 0, y: 0 };
            specialFood = null;
            bugs = [];
            score = 0;
            currentSpeed = baseSpeed;
            growthQueue = 0;

            boostInventory = 0;
            boostActive = false;
            activeBoostLevel = 0;
            boostEndsAt = 0;

            greenFoodsSinceLastSpecial = 0;
            nextSpecialThreshold = getRandomSpecialThreshold();

            currentScoreEl.innerText = score;
            updateBoostUI();
            updateStatusText();

            uiLayer.style.display = 'none';
            gameoverScore.style.display = 'none';

            spawnFood();

            lastTime = performance.now();
            accumulator = 0;

            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(gameLoop);
        }

        function isCellBlocked(x, y) {
            for (const part of snake) {
                if (part.x === x && part.y === y) return true;
            }

            for (const bug of bugs) {
                if (bug.x === x && bug.y === y) return true;
            }

            if (food && food.x === x && food.y === y) return true;
            if (specialFood && specialFood.x === x && specialFood.y === y) return true;

            return false;
        }

        function spawnFood() {
            let valid = false;

            while (!valid) {
                food.x = Math.floor(Math.random() * COLS);
                food.y = Math.floor(Math.random() * ROWS);
                valid = !isCellBlockedExceptFood(food.x, food.y);
            }
        }

        function isCellBlockedExceptFood(x, y) {
            for (const part of snake) {
                if (part.x === x && part.y === y) return true;
            }

            for (const bug of bugs) {
                if (bug.x === x && bug.y === y) return true;
            }

            if (specialFood && specialFood.x === x && specialFood.y === y) return true;
            return false;
        }

        function spawnBug() {
            let valid = false;
            let newBug = { x: 0, y: 0 };

            while (!valid) {
                newBug.x = Math.floor(Math.random() * COLS);
                newBug.y = Math.floor(Math.random() * ROWS);
                valid = true;

                const head = snake[0];
                const dist = Math.abs(head.x - newBug.x) + Math.abs(head.y - newBug.y);

                if (dist < 4) valid = false;

                if (valid) {
                    for (const part of snake) {
                        if (part.x === newBug.x && part.y === newBug.y) {
                            valid = false;
                            break;
                        }
                    }
                }

                if (valid && food.x === newBug.x && food.y === newBug.y) {
                    valid = false;
                }

                if (valid && specialFood && specialFood.x === newBug.x && specialFood.y === newBug.y) {
                    valid = false;
                }

                if (valid) {
                    for (const bug of bugs) {
                        if (bug.x === newBug.x && bug.y === newBug.y) {
                            valid = false;
                            break;
                        }
                    }
                }
            }

            bugs.push(newBug);
        }

        function spawnSpecialFood() {
            if (specialFood || boostInventory >= 3) return;

            let valid = false;
            let newSpecial = { x: 0, y: 0 };

            while (!valid) {
                newSpecial.x = Math.floor(Math.random() * COLS);
                newSpecial.y = Math.floor(Math.random() * ROWS);
                valid = true;

                for (const part of snake) {
                    if (part.x === newSpecial.x && part.y === newSpecial.y) {
                        valid = false;
                        break;
                    }
                }

                if (valid && food.x === newSpecial.x && food.y === newSpecial.y) {
                    valid = false;
                }

                if (valid) {
                    for (const bug of bugs) {
                        if (bug.x === newSpecial.x && bug.y === newSpecial.y) {
                            valid = false;
                            break;
                        }
                    }
                }
            }

            specialFood = newSpecial;
        }

        function maybeSpawnSpecialFood() {
            if (specialFood || boostInventory >= 3) return;

            if (greenFoodsSinceLastSpecial >= nextSpecialThreshold) {
                spawnSpecialFood();
                greenFoodsSinceLastSpecial = 0;
                nextSpecialThreshold = getRandomSpecialThreshold();
            }
        }

        function gameLoop(timestamp) {
            if (!hasStarted || isGameOver) return;

            if (isPaused) {
                draw();
                drawPauseOverlay();
                animationId = requestAnimationFrame(gameLoop);
                return;
            }

            updateBoostTimer(timestamp);
            updateStatusText();

            const dt = timestamp - lastTime;
            lastTime = timestamp;
            accumulator += dt;

            let effectiveSpeed = getEffectiveSpeed();

            while (accumulator >= effectiveSpeed) {
                update();
                effectiveSpeed = getEffectiveSpeed();
                accumulator -= effectiveSpeed;
            }

            draw();

            if (!isGameOver) {
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        function update() {
            dx = nextDx;
            dy = nextDy;

            const head = {
                x: snake[0].x + dx,
                y: snake[0].y + dy
            };

            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                triggerGameOver();
                return;
            }

            for (const part of snake) {
                if (head.x === part.x && head.y === part.y) {
                    triggerGameOver();
                    return;
                }
            }

            for (const bug of bugs) {
                if (head.x === bug.x && head.y === bug.y) {
                    triggerGameOver();
                    return;
                }
            }

            snake.unshift(head);

            let consumedNormalFood = false;
            let consumedSpecialFood = false;

            if (head.x === food.x && head.y === food.y) {
                consumedNormalFood = true;
            }

            if (specialFood && head.x === specialFood.x && head.y === specialFood.y) {
                consumedSpecialFood = true;
            }

            if (consumedNormalFood) {
                score++;
                currentScoreEl.innerText = score;
                greenFoodsSinceLastSpecial++;

                if (currentSpeed > 55) {
                    currentSpeed -= 1.6;
                }

                if (score % 5 === 0) {
                    spawnBug();
                }

                if (boostActive && activeBoostLevel === 3) {
                    growthQueue += 2;
                }

                spawnFood();
                maybeSpawnSpecialFood();
            }

            if (consumedSpecialFood) {
                if (boostInventory < 3) {
                    boostInventory++;
                    updateBoostUI();
                }
                specialFood = null;
            }

            if (!consumedNormalFood && !consumedSpecialFood) {
                if (growthQueue > 0) {
                    growthQueue--;
                } else {
                    snake.pop();
                }
            }
        }

        function triggerGameOver() {
            isGameOver = true;
            statusText.innerText = 'CRASHED';
            finalScoreEl.innerText = score;

            saveScoreToLeaderboard(score);

            overlayTitle.className = 'neon-text';
            overlayTitle.innerText = 'FATAL EXCEPTION';
            overlaySubtitle.innerText = 'Algoritmen kollapsade. Försök slå toppresultatet.';
            gameoverScore.style.display = 'block';
            startBtn.innerText = 'REBOOT ALGORITHM';

            uiLayer.style.display = 'flex';
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();

            ctx.fillStyle = '#00ff66';
            drawInsetRect(food.x, food.y, TILE_SIZE - 8);

            if (specialFood) {
                ctx.fillStyle = '#52f7ff';
                ctx.shadowBlur = 16;
                ctx.shadowColor = '#52f7ff';
                drawInsetRect(specialFood.x, specialFood.y, TILE_SIZE - 6);
                ctx.shadowBlur = 0;
            }

            ctx.fillStyle = '#8d0000';
            for (const bug of bugs) {
                drawInsetRect(bug.x, bug.y, TILE_SIZE - 7);
            }

            for (let i = 0; i < snake.length; i++) {
                const part = snake[i];
                if (i === 0) {
                    drawSnakeHead(part.x, part.y);
                } else {
                    ctx.fillStyle = boostActive ? '#4da8ff' : '#1b4fff';
                    drawInsetRect(part.x, part.y, TILE_SIZE - 5);
                }
            }
        }

        function drawGrid() {
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    ctx.fillStyle = '#bfefff';
                    ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);

                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 0.6;
                    ctx.strokeRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                }
            }
        }

        function drawInsetRect(x, y, size) {
            const offset = (TILE_SIZE - size) / 2;
            ctx.fillRect(
                x * TILE_SIZE + offset,
                y * TILE_SIZE + offset,
                size,
                size
            );
        }

        function drawSnakeHead(x, y) {
            const px = x * TILE_SIZE;
            const py = y * TILE_SIZE;

            ctx.fillStyle = '#2d6fff';
            ctx.beginPath();
            ctx.roundRect(px + 2, py + 2, TILE_SIZE - 4, TILE_SIZE - 4, 7);
            ctx.fill();

            let eye1, eye2;

            if (dx === 1) {
                eye1 = { x: px + 15, y: py + 8 };
                eye2 = { x: px + 15, y: py + 15 };
            } else if (dx === -1) {
                eye1 = { x: px + 9, y: py + 8 };
                eye2 = { x: px + 9, y: py + 15 };
            } else if (dy === -1) {
                eye1 = { x: px + 8, y: py + 9 };
                eye2 = { x: px + 15, y: py + 9 };
            } else {
                eye1 = { x: px + 8, y: py + 15 };
                eye2 = { x: px + 15, y: py + 15 };
            }

            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(eye1.x, eye1.y, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(eye2.x, eye2.y, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#111';
            ctx.beginPath();
            ctx.arc(eye1.x + 1, eye1.y, 1.6, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(eye2.x + 1, eye2.y, 1.6, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawPauseOverlay() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.38)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00f6ff';
            ctx.font = 'bold 28px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('PAUSAT', canvas.width / 2, canvas.height / 2 - 8);

            ctx.fillStyle = '#e0ffff';
            ctx.font = '16px Courier New';
            ctx.fillText('Tryck Space eller P för att fortsätta', canvas.width / 2, canvas.height / 2 + 24);
        }

        function showStartScreen() {
            renderLeaderboard();
            updateBoostUI();

            overlayTitle.className = 'start-text';
            overlayTitle.innerText = 'AI Training Sequence';
            overlaySubtitle.innerText = 'Samla träningsdata. Undvik väggar, buggar och din egen kod.';
            gameoverScore.style.display = 'none';
            startBtn.innerText = 'STARTA ALGORITMEN';
            statusText.innerText = 'STANDBY';
            uiLayer.style.display = 'flex';

            const startX = Math.floor(COLS / 2);
            const startY = Math.floor(ROWS / 2);

            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];

            dx = 1;
            dy = 0;
            food = { x: Math.floor(COLS * 0.72), y: Math.floor(ROWS * 0.38) };
